name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # test:unit excludes tests/unit/test_threat_modeling_live.test.ts, which
      # calls the real ihos-api over the network and times out/flakes in CI.
      # Run it on demand via `npm run test:integration` instead.
      - run: npm run test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # src/lib/env.ts validates env at import time and hard-fails a production
      # build when required vars are absent. This CI build only verifies the
      # app compiles — real deployments (Vercel) inject real values — so
      # obviously-fake placeholders that satisfy the schema are used here.
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key-0000000000
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key-00
          STANDARD_GRC_API_URL: https://ci-placeholder.invalid/api/v1
          CRON_SECRET: ci-placeholder-cron-secret-0000000000000000
