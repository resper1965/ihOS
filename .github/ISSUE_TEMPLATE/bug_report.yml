name: "🐛 Bug Report"
description: Report a bug or unexpected behavior in ihOS
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Thank you for reporting a bug! Please fill out the sections below.

        > **Security vulnerabilities** should NOT be reported here. Please follow our [Security Policy](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should have happened...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this happen?
      options:
        - Production
        - Staging
        - Development (local)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Runtime
      description: "e.g., Chrome 125, Firefox 127, Node.js 20.x"
      placeholder: Chrome 125
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: "e.g., Windows 11, macOS 14, Ubuntu 24.04"
      placeholder: Windows 11
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add screenshots or error logs to help explain the problem.
      placeholder: Paste screenshots or logs here...
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
      placeholder: Add any other context...
    validations:
      required: false
